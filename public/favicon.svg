<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006a5e"/>
      <stop offset="100%" stop-color="#008577"/>
    </linearGradient>

    <!-- Soft glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#F7F9FB"/>

  <!-- Capsule -->
  <g transform="translate(256 256) scale(1.4) rotate(-35) translate(-256 -256)" filter="url(#softGlow)">
    <rect x="110" y="180" width="300" height="150" rx="75"
          fill="none"
          stroke="url(#primaryGrad)"
          stroke-width="22"/>

    <!-- Inner sanctuary flow -->
    <path d="M160 255 Q256 190 352 255"
          fill="none"
          stroke="#7bd2c4ff"
          stroke-width="14"
          opacity="0.9"/>

    <path d="M185 285 Q256 230 327 285"
          fill="none"
          stroke="#7bd2c4ff"
          stroke-width="13"
          opacity="0.6"/>
  </g>
</svg>
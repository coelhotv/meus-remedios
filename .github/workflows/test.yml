name: Test Suite

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '.agent/**'
      - '*.md'
      - 'scripts/**'
      - 'scratches/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '.agent/**'
      - '*.md'
      - 'scripts/**'
      - 'scratches/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # JOB 1: LINT (Mais rápido - roda sempre)
  # ==========================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.{js,jsx}

      - name: Run ESLint (Incremental on PR)
        if: github.event_name == 'pull_request' && steps.changed-files.outputs.any_changed == 'true'
        run: npx eslint ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Run ESLint (Full on Main/Develop)
        if: github.event_name == 'push'
        run: npm run lint

  # ==========================================
  # JOB 2: SMOKE TESTS (Build + Testes rápidos)
  # ==========================================
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Smoke Tests
        run: npm run test:smoke

  # ==========================================
  # JOB 3: UNITÁRIOS CRÍTICOS
  # ==========================================
  critical:
    name: Unitários Críticos
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Critical Tests
        run: npm run test:critical

  # ==========================================
  # JOB 5: BUILD (Verificar se build passa)
  # ==========================================
  build:
    name: Build
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 1

name: Gemini Code Review Parser

# Refatorado em 2026-02-19
# - Removido tempo de espera fixo (5 min)
# - Adicionado trigger via webhook (pull_request_review)
# - Implementado parsing de comentários do Gemini
# - Output estruturado para agentes coder

on:
  # Trigger quando Gemini posta review
  pull_request_review:
    types: [submitted]
  
  # Trigger quando PR é atualizado (novos commits)
  # Necessário para P2.5 - Trigger de Re-review Automático
  pull_request:
    types: [synchronize]
  
  # Trigger quando Gemini comenta (fallback)
  issue_comment:
    types: [created]
  
  # Manual
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR Number to process'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GEMINI_BOT_LOGIN: 'gemini-code-assist[bot]'
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # JOB 1: Detectar Review do Gemini
  # ==========================================
  detect:
    name: Detect Gemini Review
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.context.outputs.pr_number }}
      branch: ${{ steps.context.outputs.branch }}
      commit_sha: ${{ steps.context.outputs.commit_sha }}
      has_gemini_review: ${{ steps.context.outputs.has_gemini_review }}
      should_run: ${{ steps.context.outputs.should_run }}
    
    steps:
      - name: Extract Context
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            let hasGeminiReview = false;
            
            // Determinar PR number baseado no evento
            if (context.eventName === 'workflow_dispatch') {
              prNumber = context.payload.inputs.pr_number;
            } else if (context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
              // Verificar se é review do Gemini
              hasGeminiReview = context.payload.review.user.login === 'gemini-code-assist[bot]';
            } else if (context.eventName === 'pull_request') {
              // P2.5: Trigger de Re-review Automático
              prNumber = context.payload.pull_request.number;
              // Não é review do Gemini, é trigger por novo commit
              hasGeminiReview = false;
            } else if (context.eventName === 'issue_comment') {
              prNumber = context.payload.issue.number;
              // Verificar se é comentário do Gemini ou comando manual
              const commentUser = context.payload.comment.user.login;
              const commentBody = context.payload.comment.body;
              hasGeminiReview = commentUser === 'gemini-code-assist[bot]' ||
                               commentBody.includes('/gemini review') ||
                               commentBody.includes('@gemini-code-assist');
            }
            
            // Buscar dados do PR
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(prNumber)
            });
            
            core.setOutput('pr_number', prNumber);
            core.setOutput('branch', pr.head.ref);
            core.setOutput('commit_sha', pr.head.sha);
            core.setOutput('has_gemini_review', hasGeminiReview.toString());
            core.setOutput('should_run', 'true');
            
            console.log(`PR #${prNumber}, Branch: ${pr.head.ref}, SHA: ${pr.head.sha}, Gemini Review: ${hasGeminiReview}`);

  # ==========================================
  # JOB 2: Polling para Review (se necessário)
  # ==========================================
  poll-review:
    name: Poll for Gemini Review
    runs-on: ubuntu-latest
    needs: detect
    # Só executa se não detectou review do Gemini ainda
    if: needs.detect.outputs.has_gemini_review != 'true'
    timeout-minutes: 10
    outputs:
      review_found: ${{ steps.poll.outputs.review_found }}
    
    steps:
      - name: Poll for Gemini Review
        id: poll
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 20; // 20 * 30s = 10 min
            const interval = 30000; // 30 seconds
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            
            for (let i = 0; i < maxAttempts; i++) {
              console.log(`Attempt ${i + 1}/${maxAttempts}: Checking for Gemini review...`);
              
              // Buscar reviews do PR
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              
              // Buscar comentários do PR
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100
              });
              
              // Verificar se Gemini postou review ou comentário
              const geminiReview = reviews.find(r => 
                r.user.login === 'gemini-code-assist[bot]'
              );
              
              const geminiComment = comments.find(c => 
                c.user.login === 'gemini-code-assist[bot]'
              );
              
              if (geminiReview || geminiComment) {
                console.log('✅ Gemini review found!');
                core.setOutput('review_found', 'true');
                return;
              }
              
              // Aguardar antes da próxima tentativa
              if (i < maxAttempts - 1) {
                await new Promise(resolve => setTimeout(resolve, interval));
              }
            }
            
            console.log('⚠️ No Gemini review found after polling');
            core.setOutput('review_found', 'false');

  # ==========================================
  # JOB 3: Parsear Comentários
  # ==========================================
  parse:
    name: Parse Gemini Comments
    runs-on: ubuntu-latest
    needs: [detect, poll-review]
    # Executa sempre que detect OU poll-review terminaram (mesmo se skipped)
    # Só roda se detectou review do Gemini OU polling encontrou review
    if: always() && (needs.detect.outputs.has_gemini_review == 'true' || needs.poll-review.outputs.review_found == 'true')
    outputs:
      total_issues: ${{ steps.parse.outputs.total_issues }}
      auto_fixable: ${{ steps.parse.outputs.auto_fixable }}
      needs_agent: ${{ steps.parse.outputs.needs_agent }}
      critical: ${{ steps.parse.outputs.critical }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.branch }}
      
      # ==========================================
      # P3.1: Cache de Reviews
      # Restaura cache de reviews anteriores para evitar re-análise
      # ==========================================
      - name: Restore Review Cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: .gemini-cache
          key: gemini-review-cache-${{ github.run_id }}
          restore-keys: |
            gemini-review-cache-
      
      # ==========================================
      # FIX: Aguardar comentários inline do Gemini
      # O Gemini posta um resumo inicial rapidamente (~30s),
      # mas os comentários inline vêm depois (~60-90s).
      # ==========================================
      - name: Wait for Gemini Inline Comments
        id: wait-inline
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 10; // 10 * 15s = 2.5 min
            const interval = 15000; // 15 seconds
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            
            console.log('⏳ Waiting for Gemini inline comments...');
            
            for (let i = 0; i < maxAttempts; i++) {
              // Buscar comentários inline (review comments)
              const { data: reviewComments } = await github.rest.pulls.listReviewComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              
              const geminiInlineComments = reviewComments.filter(c => 
                c.user.login === 'gemini-code-assist[bot]'
              );
              
              if (geminiInlineComments.length > 0) {
                console.log(`✅ Found ${geminiInlineComments.length} Gemini inline comments after ${i * 15} seconds`);
                core.setOutput('inline_comments_found', 'true');
                core.setOutput('inline_comments_count', geminiInlineComments.length.toString());
                return;
              }
              
              console.log(`Attempt ${i + 1}/${maxAttempts}: No inline comments yet, waiting...`);
              
              if (i < maxAttempts - 1) {
                await new Promise(resolve => setTimeout(resolve, interval));
              }
            }
            
            console.log('⚠️ No Gemini inline comments found after 2.5 minutes');
            core.setOutput('inline_comments_found', 'false');
            core.setOutput('inline_comments_count', '0');
      
      - name: Fetch Gemini Comments
        id: fetch
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            
            // Buscar reviews do PR
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            // Buscar comentários do PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });
            
            // Buscar comentários inline (review comments)
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            // 🆕 Buscar review threads para verificar status de resolução
            const { data: reviewThreads } = await github.rest.pulls.listReviewThreads({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            // Criar set de IDs de comentários em threads resolvidas
            const resolvedCommentIds = new Set();
            reviewThreads.forEach(thread => {
              if (thread.resolved) {
                thread.comments.forEach(comment => {
                  resolvedCommentIds.add(comment.id);
                });
              }
            });
            
            console.log(`🔍 Encontradas ${resolvedCommentIds.size} threads resolvidas`);
            
            // Filtrar apenas comentários do Gemini (excluindo resolvidos)
            const geminiReviews = reviews.filter(r =>
              r.user.login === 'gemini-code-assist[bot]'
            );
            
            const geminiComments = comments.filter(c =>
              c.user.login === 'gemini-code-assist[bot]'
            );
            
            // 🆕 Filtrar comentários resolvidos
            const geminiReviewComments = reviewComments.filter(c => {
              const isGemini = c.user.login === 'gemini-code-assist[bot]';
              const isResolved = resolvedCommentIds.has(c.id);
              if (isGemini && isResolved) {
                console.log(`✅ Ignorando comentário resolvido: ${c.path}:${c.line}`);
              }
              return isGemini && !isResolved;
            });
            
            // Salvar para parsing
            const data = {
              reviews: geminiReviews,
              comments: geminiComments,
              reviewComments: geminiReviewComments
            };
            
            require('fs').writeFileSync('gemini-raw-comments.json', JSON.stringify(data, null, 2));
            
            console.log(`Found ${geminiReviews.length} reviews, ${geminiComments.length} comments, ${geminiReviewComments.length} review comments`);

      - name: Parse Comments
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Carregar parser
            const parser = require('./.github/scripts/parse-gemini-comments.cjs');
            
            // Carregar dados brutos
            const rawData = JSON.parse(fs.readFileSync('gemini-raw-comments.json', 'utf8'));
            
            // Parsear todos os comentários inline (mais úteis)
            const parsedComments = rawData.reviewComments.map(c => parser.parseGeminiComment(c));
            
            // Categorizar issues
            const categorized = parser.categorizeIssues(parsedComments);
            
            // Gerar output estruturado
            const output = parser.generateStructuredOutput(
              parseInt("${{ needs.detect.outputs.pr_number }}"),
              `review-${Date.now()}`,
              parsedComments
            );
            
            // Salvar output
            fs.mkdirSync('.gemini-output', { recursive: true });
            fs.writeFileSync(
              `.gemini-output/review-${{ needs.detect.outputs.pr_number }}.json`,
              JSON.stringify(output, null, 2)
            );
            
            // Outputs para próximos jobs
            core.setOutput('total_issues', output.summary.total_issues);
            core.setOutput('auto_fixable', output.summary.auto_fixable);
            core.setOutput('needs_agent', output.summary.needs_agent);
            core.setOutput('critical', output.summary.critical);
            
            console.log('📊 Parsing Results:');
            console.log(`  Total Issues: ${output.summary.total_issues}`);
            console.log(`  Auto-fixable: ${output.summary.auto_fixable}`);
            console.log(`  Needs Agent: ${output.summary.needs_agent}`);
            console.log(`  Critical: ${output.summary.critical}`);

      # ==========================================
      # P3.1: Limpeza de Cache Expirado
      # Remove entradas com mais de 30 dias
      # ==========================================
      - name: Clean Expired Cache
        run: |
          if [ -d ".gemini-cache" ]; then
            echo "🧹 Cleaning expired cache entries..."
            node -e "
              const { cleanExpiredCache, getCacheStats } = require('./.github/scripts/review-cache.js');
              const statsBefore = getCacheStats();
              console.log('Cache stats before cleanup:', statsBefore);
              const removed = cleanExpiredCache(30);
              const statsAfter = getCacheStats();
              console.log('Cache stats after cleanup:', statsAfter);
              console.log(\`Removed \${removed} expired entries\`);
            "
          else
            echo "No cache directory found, skipping cleanup"
          fi
      
      - name: Debug - List files
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in current directory:"
          ls -la
          echo "Files in .gemini-output:"
          ls -la .gemini-output/ || echo "Directory .gemini-output not found"
          echo "Files in .gemini-cache:"
          ls -la .gemini-cache/ || echo "Directory .gemini-cache not found"
          echo "Absolute path:"
          realpath .gemini-output/ || echo "realpath not available"
      
      # ==========================================
      # P3.1: Save Review Cache
      # Salva cache para uso em execuções futuras
      # ==========================================
      - name: Save Review Cache
        uses: actions/cache@v4
        with:
          path: .gemini-cache
          key: gemini-review-cache-${{ github.run_id }}
      
      - name: Upload Structured Output
        uses: actions/upload-artifact@v4
        with:
          name: gemini-review-output
          path: .gemini-output/*.json
          retention-days: 7
          if-no-files-found: error
          include-hidden-files: true

  # ==========================================
  # JOB 3.4: Upload para Vercel Blob
  # ==========================================
  # Faz upload do output estruturado para Vercel Blob.
  # Permite que endpoints Vercel acessem os dados de review
  # sem precisar acessar o GitHub Actions diretamente.
  # ==========================================
  upload-to-blob:
    name: Upload Review to Vercel Blob
    runs-on: ubuntu-latest
    needs: [detect, parse]
    # Executa sempre que parse rodou com sucesso
    if: always() && needs.parse.result == 'success'
    outputs:
      blob_url: ${{ steps.upload.outputs.blob_url }}
      blob_pathname: ${{ steps.upload.outputs.blob_pathname }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Download Review Output
        uses: actions/download-artifact@v4
        with:
          name: gemini-review-output
          path: .gemini-output/
        continue-on-error: false
      
      - name: Upload to Vercel Blob
        id: upload
        uses: actions/github-script@v7
        env:
          VERCEL_BLOB_TOKEN: ${{ secrets.VERCEL_BLOB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const { uploadToVercelBlob } = require('./.github/scripts/upload-to-vercel-blob.cjs');
            
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            const outputDir = '.gemini-output';
            
            // Encontrar arquivo de review
            const reviewFile = path.join(outputDir, `review-${prNumber}.json`);
            
            if (!fs.existsSync(reviewFile)) {
              throw new Error(`Arquivo de review não encontrado: ${reviewFile}`);
            }
            
            console.log(`🔄 Fazendo upload do review para PR #${prNumber}...`);
            
            try {
              // Fazer upload com nome único incluindo timestamp
              const timestamp = Date.now();
              const remoteName = `reviews/pr-${prNumber}/review-${timestamp}.json`;
              
              const result = await uploadToVercelBlob(reviewFile, {
                remoteName,
                private: true // Arquivos privados, acessados via endpoint Vercel
              });
              
              console.log('✅ Upload concluído:');
              console.log(`   URL: ${result.url}`);
              console.log(`   Pathname: ${result.pathname}`);
              
              // Outputs para próximos jobs
              core.setOutput('blob_url', result.url);
              core.setOutput('blob_pathname', result.pathname);
              
              // Salvar metadata para referência
              const metadata = {
                pr_number: prNumber,
                blob_url: result.url,
                blob_pathname: result.pathname,
                uploaded_at: new Date().toISOString(),
                timestamp
              };
              
              fs.mkdirSync('.gemini-output/metadata', { recursive: true });
              fs.writeFileSync(
                `.gemini-output/metadata/blob-${prNumber}.json`,
                JSON.stringify(metadata, null, 2)
              );
              
            } catch (error) {
              console.error('❌ Erro no upload para Blob:', error.message);
              throw error;
            }
      
      - name: Upload Blob Metadata
        uses: actions/upload-artifact@v4
        with:
          name: blob-metadata
          path: .gemini-output/metadata/*.json
          retention-days: 7
          if-no-files-found: warn

  # ==========================================
  # JOB 3.5: Persistir Reviews no Supabase (Sprint 6)
  # ==========================================
  # Persiste os reviews parseados no Supabase para rastreamento
  # de Workflow Intelligence. Este job garante que todos os issues
  # detectados pelo Gemini sejam armazenados para análise e follow-up.
  # ==========================================
  persist:
    name: Persist Reviews to Supabase via Vercel API
    runs-on: ubuntu-latest
    needs: [detect, parse, upload-to-blob]
    # Executa sempre que parse rodou com sucesso e blob foi uploadado
    if: always() && needs.parse.result == 'success' && needs.upload-to-blob.result == 'success'
    env:
      VERCEL_GITHUB_ACTIONS_SECRET: ${{ secrets.VERCEL_GITHUB_ACTIONS_SECRET }}
      VERCEL_API_URL: 'https://meus-remedios.vercel.app'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Download Blob Metadata
        uses: actions/download-artifact@v4
        with:
          name: blob-metadata
          path: .gemini-output/metadata/
        continue-on-error: true
      
      - name: Persist Reviews via Vercel API
        id: persist
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Gerar JWT para autenticação
            const { SignJWT } = require('jose');
            
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            const commitSha = "${{ needs.detect.outputs.commit_sha }}";
            const metadataDir = '.gemini-output/metadata';
            
            // Buscar blob_url do metadata
            const metadataFiles = fs.readdirSync(metadataDir).filter(f => f.startsWith('blob-'));
            let blobUrl = null;
            
            for (const file of metadataFiles) {
              const metadata = JSON.parse(fs.readFileSync(path.join(metadataDir, file), 'utf8'));
              if (metadata.pr_number === prNumber) {
                blobUrl = metadata.blob_url;
                break;
              }
            }
            
            if (!blobUrl) {
              console.log('⚠️ Blob URL não encontrada, pulando persistência');
              return;
            }
            
            console.log(`🔄 Gerando JWT e persistindo reviews para PR #${prNumber}...`);
            console.log(`   Commit SHA: ${commitSha}`);
            
            try {
              // Gerar JWT
              const secret = new TextEncoder().encode(process.env.VERCEL_GITHUB_ACTIONS_SECRET);
              const jwt = await new SignJWT({
                iss: 'github-actions',
                aud: 'vercel-api'
              })
                .setProtectedHeader({ alg: 'HS256' })
                .setIssuedAt()
                .setExpirationTime('5m')
                .sign(secret);
              
              // Chamar endpoint Vercel
              const response = await fetch(`${process.env.VERCEL_API_URL}/api/gemini-reviews/persist`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${jwt}`
                },
                body: JSON.stringify({
                  pr_number: prNumber,
                  commit_sha: commitSha,
                  blob_url: blobUrl
                })
              });
              
              if (!response.ok) {
                const error = await response.json();
                throw new Error(`API Error ${response.status}: ${error.error || 'Unknown'}`);
              }
              
              const result = await response.json();
              
              console.log('✅ Persistência concluída:');
              console.log(`   Criados: ${result.data?.created || 0}`);
              console.log(`   Atualizados: ${result.data?.updated || 0}`);
              console.log(`   Ignorados: ${result.data?.skipped || 0}`);
              console.log(`   Reativados: ${result.data?.reactivated || 0}`);
              
              if (result.data?.errors?.length > 0) {
                console.log(`   ⚠️ Erros: ${result.data.errors.length}`);
                result.data.errors.forEach(err => console.log(`      - ${err}`));
              }
              
              core.setOutput('created', result.data?.created || 0);
              core.setOutput('updated', result.data?.updated || 0);
              core.setOutput('skipped', result.data?.skipped || 0);
              
            } catch (error) {
              console.error('❌ Erro ao persistir reviews:', error.message);
              // Não falha o workflow, apenas loga o erro
              console.log('Workflow continua normalmente...');
            }

  # ==========================================
  # JOB 3.6: Verificar Issues Críticas (P1 - Phase 2)
  # ==========================================
  # Verifica se existem issues CRITICAL ou HIGH (segurança/performance)
  # que devem bloquear o workflow. Se encontrar, posta alerta no PR
  # e bloqueia a execução. Issues MEDIUM/LOW podem criar issues normalmente.
  # ==========================================
  check-critical:
    name: Check Critical/High Issues
    runs-on: ubuntu-latest
    needs: [detect, parse, persist]
    # Executa sempre que persist rodou com sucesso
    if: always() && needs.persist.result == 'success'
    outputs:
      has_blocking_issues: ${{ steps.check.outputs.has_blocking_issues }}
      has_critical: ${{ steps.check.outputs.has_critical }}
      has_high_security: ${{ steps.check.outputs.has_high_security }}
      has_high_performance: ${{ steps.check.outputs.has_high_performance }}
      blocking_count: ${{ steps.check.outputs.blocking_count }}
      critical_count: ${{ steps.check.outputs.critical_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Review Output
        uses: actions/download-artifact@v4
        with:
          name: gemini-review-output
          path: .gemini-output/
        continue-on-error: true

      - name: Check for Blocking Issues
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            const reviewFile = path.join('.gemini-output', `review-${prNumber}.json`);

            // Carregar e executar verificação
            const { checkCriticalIssues } = require('./.github/scripts/check-critical-issues.cjs');

            const result = await checkCriticalIssues({
              reviewFile: fs.existsSync(reviewFile) ? reviewFile : null,
              github: github,
              context: context,
              core: core,
              prNumber: prNumber
            });

            console.log(`Verificação concluída: ${result.hasBlockingIssues ? '❌ Issues bloqueantes encontrados' : '✅ Nenhum issue bloqueante'}`);

  # ==========================================
  # JOB 4: Notificar Agents Externos (P4.7)
  # ==========================================
  # Envia webhooks para agents externos (como Kilocode) quando
  # novas reviews do Gemini Code Assist estão disponíveis.
  # Não falha o workflow se o webhook falhar.
  # ==========================================
  notify-agents:
    name: Notify External Agents
    runs-on: ubuntu-latest
    needs: [detect, parse]
    # Executa se parse rodou com sucesso
    if: always() && needs.parse.result == 'success'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Review Output
        uses: actions/download-artifact@v4
        with:
          name: gemini-review-output
          path: .gemini-output/
        continue-on-error: true
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Notify Agents
        id: notify
        uses: actions/github-script@v7
        env:
          AGENT_WEBHOOK_URLS: ${{ secrets.AGENT_WEBHOOK_URLS }}
          AGENT_WEBHOOK_SECRET: ${{ secrets.AGENT_WEBHOOK_SECRET }}
          NOTIFY_MODE: 'critical' # 'critical', 'high', 'all'
        with:
          script: |
            const fs = require('fs');
            const {
              shouldNotify,
              notifyAgents,
              parseWebhookUrls
            } = require('./.github/scripts/notify-agents.cjs');
            
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            const branch = "${{ needs.detect.outputs.branch }}";
            const commitSha = "${{ github.event.pull_request.head.sha || github.sha }}";
            
            // Carregar dados da review
            let reviewData;
            try {
              reviewData = JSON.parse(fs.readFileSync(`.gemini-output/review-${prNumber}.json`, 'utf8'));
            } catch (e) {
              console.log('⚠️ Arquivo de review não encontrado, pulando notificação');
              return;
            }
            
            // Verificar se deve notificar
            const notifyMode = process.env.NOTIFY_MODE || 'critical';
            if (!shouldNotify(reviewData, notifyMode)) {
              console.log(`ℹ️ Nenhum issue ${notifyMode.toUpperCase()} encontrado, pulando notificação`);
              return;
            }
            
            console.log(`🔔 Issues ${notifyMode.toUpperCase()} detectados, notificando agents...`);
            
            // Parsear webhooks configurados
            const webhooksConfig = process.env.AGENT_WEBHOOK_URLS;
            const agentWebhooks = parseWebhookUrls(webhooksConfig);
            
            if (agentWebhooks.length === 0) {
              console.log('ℹ️ Nenhum webhook configurado em AGENT_WEBHOOK_URLS');
              return;
            }
            
            console.log(`📡 ${agentWebhooks.length} webhook(s) configurado(s)`);
            
            // Notificar agents
            const secret = process.env.AGENT_WEBHOOK_SECRET || '';
            const webhookContext = { prNumber, branch, commitSha };
            
            try {
              const result = await notifyAgents(reviewData, agentWebhooks, secret, webhookContext);
              
              // Log de resultados
              const successCount = result.results.filter(r => r.success).length;
              console.log(`✅ ${successCount}/${result.results.length} notificações enviadas com sucesso`);
              
              // Falhas individuais são logadas mas não falham o workflow
              const failures = result.results.filter(r => !r.success);
              if (failures.length > 0) {
                console.log('⚠️ Falhas:');
                failures.forEach(f => {
                  console.log(`  - ${f.webhook}: ${f.error || f.status}`);
                });
              }
              
              core.setOutput('notified', successCount > 0);
              core.setOutput('success_count', successCount);
              core.setOutput('failure_count', failures.length);
              
            } catch (error) {
              // Nunca falha o workflow por erro de webhook
              console.log(`⚠️ Erro ao notificar agents: ${error.message}`);
              console.log('Workflow continua normalmente...');
            }

  # ==========================================
  # JOB 5: Auto-Fix (se aplicável)
  # ==========================================
  auto-fix:
    name: Apply Auto-Fixes
    runs-on: ubuntu-latest
    needs: [detect, parse]
    # Só executa se parse rodou e encontrou issues auto-fixable
    if: always() && needs.parse.result == 'success' && needs.parse.outputs.auto_fixable > 0
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.detect.outputs.branch }}
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install
        run: npm ci
      
      - name: Apply Fixes
        run: |
          npm run lint -- --fix || true
          npx prettier --write "src/**/*.{js,jsx,css}" || true
      
      - name: Check Changes
        id: check
        run: echo "count=$(git diff --name-only | wc -l)" >> $GITHUB_OUTPUT
      
      - name: Commit Auto-Fixes
        if: steps.check.outputs.count > 0
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: auto-fix issues from Gemini Code Review [skip ci]"
          branch: ${{ needs.detect.outputs.branch }}

  # ==========================================
  # JOB 5: Validar
  # ==========================================
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    needs: [detect, auto-fix]
    # Sempre executa, mesmo se não houve auto-fix
    if: always() && needs.detect.outputs.has_gemini_review == 'true'
    outputs:
      lint: ${{ steps.check.outputs.lint }}
      smoke: ${{ steps.check.outputs.smoke }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.branch }}
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install
        run: npm ci
      
      - name: Run Checks
        id: check
        run: |
          if npm run lint; then echo "lint=passed" >> $GITHUB_OUTPUT; else echo "lint=failed" >> $GITHUB_OUTPUT; fi
          if npm run test:smoke; then echo "smoke=passed" >> $GITHUB_OUTPUT; else echo "smoke=failed" >> $GITHUB_OUTPUT; fi


  # ==========================================
  # JOB 6: Aplicar Labels
  # ==========================================
  apply-labels:
    name: Apply Labels
    runs-on: ubuntu-latest
    needs: [detect, parse]
    if: always() && needs.detect.outputs.should_run == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Output
        uses: actions/download-artifact@v4
        with:
          name: gemini-review-output
          path: .gemini-output/
        continue-on-error: true
      
      - name: Apply Labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Carregar output estruturado
            let reviewData;
            try {
              reviewData = JSON.parse(fs.readFileSync(`.gemini-output/review-${{ needs.detect.outputs.pr_number }}.json`, 'utf8'));
            } catch (e) {
              console.log('Review file not found, using empty data');
              reviewData = { summary: { total_issues: 0, auto_fixable: 0, critical: 0, needs_agent: 0 }, issues: [] };
            }
            
            const { applyLabels } = require('./.github/scripts/apply-labels.cjs');
            const labels = await applyLabels(reviewData, ${{ needs.detect.outputs.pr_number }});
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ needs.detect.outputs.pr_number }},
                labels: labels
              });
              console.log(`Applied ${labels.length} labels:`, labels);
            } else {
              console.log('No labels to apply');
            }


  # ==========================================
  # JOB 7: Postar Resumo (Editável)
  # ==========================================
  # P2.2: Resumo Editável - Mantém apenas um comentário por PR
  # Estratégia: Verifica se existe comentário com marcador GEMINI_REVIEW_SUMMARY
  # - Se existir: atualiza o comentário existente
  # - Se não existir: cria novo comentário
  # ==========================================
  summary:
    name: Post/Update Summary
    runs-on: ubuntu-latest
    needs: [detect, parse, validate]
    # Só executa se parse rodou com sucesso
    if: always() && needs.parse.result == 'success'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Output
        uses: actions/download-artifact@v4
        with:
          name: gemini-review-output
          path: .gemini-output/
        continue-on-error: true
      
      - name: Post or Update Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Carregar output estruturado
            let reviewData;
            try {
              reviewData = JSON.parse(fs.readFileSync(`.gemini-output/review-${{ needs.detect.outputs.pr_number }}.json`, 'utf8'));
            } catch (e) {
              console.log('Review file not found, using empty data');
              reviewData = { summary: { total_issues: 0, auto_fixable: 0, critical: 0, needs_agent: 0 }, issues: [] };
            }
            
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            
            // Importar e executar script de resumo inteligente
            const { postOrUpdateSummary } = require('./.github/scripts/post-smart-summary.cjs');
            const result = await postOrUpdateSummary(reviewData, prNumber, github, context);
            
            console.log(`Summary ${result.action}: ${result.url}`);

  # ==========================================
  # JOB 8: Trigger Re-review Automático (P2.5)
  # ==========================================
  # Detecta quando novos commits são pushados e
  # automaticamente solicita re-review do Gemini
  # se as alterações forem significativas.
  #
  # ⚠️ NOTA: Quando issues CRITICAL são corrigidos, o workflow pode
  # continuar bloqueado até que o Gemini poste novo review. Neste caso,
  # o mantenedor deve comentar `/gemini review` no PR para forçar
  # re-avaliação manual.
  # ==========================================
  trigger-rereview:
    name: Trigger Re-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check and Trigger Re-review
        uses: actions/github-script@v7
        with:
          script: |
            const { shouldTriggerRereview, triggerRereview } = require('./.github/scripts/trigger-re-review.cjs');
            
            const shouldTrigger = await shouldTriggerRereview(
              context.payload.pull_request.number,
              github,
              context
            );
            
            if (shouldTrigger) {
              console.log('Alterações significativas detectadas, solicitando re-review...');
              await triggerRereview(
                context.payload.pull_request.number,
                github,
                context
              );
              
              // 📝 NOTA: O workflow continuará com dados antigos do review.
              // Se havia issues CRITICAL que foram corrigidos, o mantenedor
              // deve executar `/gemini review` manualmente após o novo
              // review ser postado pelo Gemini.
              console.log('⚠️ IMPORTANTE: Se havia issues CRITICAL corrigidos,');
              console.log('   comente "/gemini review" no PR após 60-90s para re-avaliação.');
            } else {
              console.log('Alterações menores, sem necessidade de re-review');
            }

  # ==========================================
  # JOB 9: Criar Issues para Refactoring (P2.3)
  # ==========================================
  # Cria GitHub Issues automaticamente para issues MEDIUM
  # que não podem ser auto-fixados. Isso move discussões de
  # refactoring para fora da timeline do PR.
  # ==========================================
  create-issues:
    name: Create GitHub Issues via Vercel API
    runs-on: ubuntu-latest
    needs: [detect, parse, upload-to-blob, persist, check-critical]
    # Só cria issues se NÃO houver issues bloqueantes (CRITICAL/HIGH security/performance)
    if: always() && needs.detect.outputs.should_run == 'true' && needs.upload-to-blob.result == 'success' && needs.persist.result == 'success' && needs.check-critical.outputs.has_blocking_issues != 'true'
    env:
      VERCEL_GITHUB_ACTIONS_SECRET: ${{ secrets.VERCEL_GITHUB_ACTIONS_SECRET }}
      VERCEL_API_URL: 'https://meus-remedios.vercel.app'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
      
      - name: Download Blob Metadata
        uses: actions/download-artifact@v4
        with:
          name: blob-metadata
          path: .gemini-output/metadata/
        continue-on-error: true
      
      - name: Create Issues via Vercel API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Gerar JWT para autenticação
            const { SignJWT } = require('jose');
            
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            const metadataDir = '.gemini-output/metadata';
            
            // Buscar blob_url do metadata
            const metadataFiles = fs.readdirSync(metadataDir).filter(f => f.startsWith('blob-'));
            let blobUrl = null;
            
            for (const file of metadataFiles) {
              const metadata = JSON.parse(fs.readFileSync(path.join(metadataDir, file), 'utf8'));
              if (metadata.pr_number === prNumber) {
                blobUrl = metadata.blob_url;
                break;
              }
            }
            
            if (!blobUrl) {
              console.log('⚠️ Blob URL não encontrada, pulando criação de issues');
              return;
            }
            
            console.log(`🔄 Gerando JWT e criando issues via Vercel API para PR #${prNumber}...`);
            
            try {
              // Gerar JWT
              const secret = new TextEncoder().encode(process.env.VERCEL_GITHUB_ACTIONS_SECRET);
              const jwt = await new SignJWT({
                iss: 'github-actions',
                aud: 'vercel-api'
              })
                .setProtectedHeader({ alg: 'HS256' })
                .setIssuedAt()
                .setExpirationTime('5m')
                .sign(secret);
              
              // Chamar endpoint Vercel
              const response = await fetch(`${process.env.VERCEL_API_URL}/api/gemini-reviews/create-issues`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${jwt}`
                },
                body: JSON.stringify({
                  blob_url: blobUrl,
                  pr_number: prNumber,
                  commit_sha: '${{ github.event.pull_request.head.sha || github.sha }}',
                  owner: context.repo.owner,
                  repo: context.repo.repo
                })
              });
              
              if (!response.ok) {
                const error = await response.json();
                throw new Error(`API Error ${response.status}: ${error.error || 'Unknown'}`);
              }
              
              const result = await response.json();
              const createdIssues = result.data?.issues || [];
              
              if (createdIssues.length > 0) {
                console.log(`✅ Criadas ${createdIssues.length} issues: ${createdIssues.map(i => '#' + i.github_issue_number).join(', ')}`);
                
                // Adicionar comentário no PR com link para as issues criadas
                const issueLinks = createdIssues.map(i => `- #${i.github_issue_number}`).join('\n');
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `## 🤖 Issues de Refactoring Criadas\n\nForam criadas as seguintes issues para acompanhamento de refactoring:\n\n${issueLinks}\n\nEstas issues podem ser implementadas em um PR futuro.`
                });
              } else {
                console.log('Nenhuma issue nova criada (já existem issues similares ou não há issues MEDIUM)');
              }
              
            } catch (error) {
              console.error('❌ Erro ao criar issues:', error.message);
              // Não falha o workflow, apenas loga o erro
              console.log('Workflow continua normalmente...');
            }

  # ==========================================
  # JOB 10: Check Resolutions via Vercel API (P2.4)
  # ==========================================
  # Verifica se issues apontados pelo Gemini em comentários
  # inline foram resolvidos em novos commits e responde em
  # threads sem poluir a timeline principal do PR.
  # Depois, atualiza o status no Supabase via Vercel API.
  # ==========================================
  check-resolutions:
    name: Check Resolution via Vercel API
    runs-on: ubuntu-latest
    needs: [detect, parse, persist]
    # Executa após persist ter sucesso para ter dados atualizados no Supabase
    # Remove restrição de synchronize para permitir execução em outros contextos
    if: always() && needs.persist.result == 'success'
    env:
      VERCEL_GITHUB_ACTIONS_SECRET: ${{ secrets.VERCEL_GITHUB_ACTIONS_SECRET }}
      VERCEL_API_URL: 'https://meus-remedios.vercel.app'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.branch }}
          fetch-depth: 0  # Necessário para comparação de commits

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Resolutions and Update Status via Vercel API
        uses: actions/github-script@v7
        with:
          script: |
            const { SignJWT } = require('jose');
            
            const prNumber = parseInt("${{ needs.detect.outputs.pr_number }}");
            
            console.log(`🔄 Verificando resoluções para PR #${prNumber}...`);
            
            // Primeiro, verificar se há comentários do Gemini para processar
            const { shouldCheckResolutions, checkResolutions } = require('./.github/scripts/check-resolutions.cjs');
            
            const shouldRun = await shouldCheckResolutions(prNumber, github, context);
            
            if (!shouldRun) {
              console.log('ℹ️ Nenhuma ação necessária - sem novos commits ou sem comentários do Gemini');
              return;
            }
            
            // Executar verificação de resoluções localmente
            const results = await checkResolutions(prNumber, github, context);
            
            // Preparar atualizações para enviar ao endpoint Vercel
            const updates = [];
            
            // Mapear resoluções para o formato do endpoint
            for (const resolution of results.resolutions || []) {
              if (resolution.review_id) {
                updates.push({
                  review_id: resolution.review_id,
                  status: resolution.resolved ? 'resolved' : (resolution.partial ? 'partial' : 'detected'),
                  resolution_type: resolution.resolved ? 'fixed' : (resolution.partial ? 'partial' : null),
                  commit_sha: '${{ github.event.after }}'
                });
              }
            }
            
            if (updates.length === 0) {
              console.log('ℹ️ Nenhuma atualização de status necessária');
              return;
            }
            
            console.log(`🔄 Atualizando ${updates.length} status via Vercel API...`);
            
            try {
              // Gerar JWT
              const secret = new TextEncoder().encode(process.env.VERCEL_GITHUB_ACTIONS_SECRET);
              const jwt = await new SignJWT({
                iss: 'github-actions',
                aud: 'vercel-api'
              })
                .setProtectedHeader({ alg: 'HS256' })
                .setIssuedAt()
                .setExpirationTime('5m')
                .sign(secret);
              
              // Chamar endpoint Vercel para atualização em batch
              const response = await fetch(`${process.env.VERCEL_API_URL}/api/gemini-reviews/update-status`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${jwt}`
                },
                body: JSON.stringify({ updates })
              });
              
              if (!response.ok) {
                const error = await response.json();
                throw new Error(`API Error ${response.status}: ${error.error || 'Unknown'}`);
              }
              
              const result = await response.json();
              
              console.log('✅ Atualização de status concluída:');
              console.log(`   Sucessos: ${result.updated || 0}`);
              if (result.errors?.length > 0) {
                console.log(`   Erros: ${result.errors.length}`);
              }
              
            } catch (error) {
              console.error('❌ Erro ao atualizar status:', error.message);
              // Não falha o workflow
            }
            
            // Output para debugging
            core.setOutput('checked', results.checked);
            core.setOutput('resolved', results.resolved);
            core.setOutput('partial', results.partial);
            core.setOutput('rejected', results.rejected);
            core.setOutput('replies_count', results.replies.length);
            core.setOutput('updated_status_count', updates.length);

            console.log('✅ Verificação de resoluções concluída');

<svg viewBox="0 0 100 100" width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Pílula (cápsula) -->
  <rect x="5" y="29" width="90" height="42" rx="20"
        fill="none" stroke="#006a5e" stroke-width="4"
        transform="rotate(-45 50 50)" />

  <!-- IC Body (corpo do chip) -->
  <rect x="38" y="38" width="24" height="24" rx="2"
        fill="none" stroke="#006a5e" stroke-width="1.2" />

  <!-- Pino superior central com zigzag até borda -->
  <line x1="50" y1="38" x2="50" y2="32" stroke="#006a5e" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 50 32 L 50 20 L 49 20"
        stroke="#006a5e" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Pino inferior central com zigzag até borda -->
  <line x1="50" y1="62" x2="50" y2="68" stroke="#006a5e" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 50 68 L 50 80 L 47 82"
        stroke="#006a5e" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Pino esquerdo com zigzag até borda -->
  <line x1="38" y1="50" x2="32" y2="50" stroke="#006a5e" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 32 50 L 20 50 L 21 48"
        stroke="#006a5e" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Pino direito com zigzag até borda -->
  <line x1="62" y1="50" x2="68" y2="50" stroke="#006a5e" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 68 50 L 80 50 L 80 50"
        stroke="#006a5e" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Pinos superiores laterais (simples) -->
  <line x1="42" y1="38" x2="42" y2="32" stroke="#006a5e" stroke-width="1.2" stroke-linecap="round" />
  <line x1="58" y1="38" x2="58" y2="32" stroke="#006a5e" stroke-width="1.2" stroke-linecap="round" />

  <!-- Pinos inferiores laterais (simples) -->
  <line x1="42" y1="62" x2="42" y2="68" stroke="#006a5e" stroke-width="1.2" stroke-linecap="round" />
  <line x1="58" y1="62" x2="58" y2="68" stroke="#006a5e" stroke-width="1.2" stroke-linecap="round" />

  <!-- Pino esquerdo inferior -->
  <line x1="38" y1="56" x2="32" y2="56" stroke="#006a5e" stroke-width="1.1" stroke-linecap="round" />

  <!-- Pino direito inferior -->
  <line x1="62" y1="56" x2="68" y2="56" stroke="#006a5e" stroke-width="1.1" stroke-linecap="round" />

  <!-- Pino esquerdo superior -->
  <line x1="38" y1="44" x2="32" y2="44" stroke="#006a5e" stroke-width="1.1" stroke-linecap="round" />

  <!-- Pino direito superior -->
  <line x1="62" y1="44" x2="68" y2="44" stroke="#006a5e" stroke-width="1.1" stroke-linecap="round" />

  <!-- Detalhe interno: ponto de referência (cavidade do IC real) -->
  <circle cx="42" cy="42" r="1.5" fill="#006a5e" />

  <!-- Linhas de circuito internas -->
  <line x1="46" y1="44" x2="54" y2="44" stroke="#006a5e" stroke-width="0.8" opacity="0.6" />
  <line x1="46" y1="50" x2="54" y2="50" stroke="#006a5e" stroke-width="0.8" opacity="0.6" />
  <line x1="46" y1="56" x2="54" y2="56" stroke="#006a5e" stroke-width="0.8" opacity="0.6" />
  <line x1="50" y1="44" x2="50" y2="56" stroke="#006a5e" stroke-width="0.8" opacity="0.6" />
</svg>
